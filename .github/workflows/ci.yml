name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint action.yml with actionlint
        uses: rhysd/actionlint@v1
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Invoke composite action (smoke)
        uses: ./
        with:
          mode: pr-preview
