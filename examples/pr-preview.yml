# Phase 36 finalizes PR-preview mode. The version below is illustrative only.
name: Handover Docs Preview
on:
  pull_request:
    paths:
      - 'src/**'
      - 'docs/**'
concurrency:
  group: handover-preview-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  pull-requests: write
jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: handover/regenerate-docs@v0
        with:
          mode: pr-preview
